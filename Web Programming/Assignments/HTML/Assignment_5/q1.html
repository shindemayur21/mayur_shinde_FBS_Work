<!DOCTYPE html>
<html>
<head>
    <title>Registration Form</title>
</head>
<body>

    <h1>User Registration Form</h1>

    <form action="submit.html" method="post">

        <!-- Text Input -->
        <label>Full Name:</label><br>
        <input type="text" name="fullname" placeholder="Enter your name" value=""><br><br>

        <!-- Email Input -->
        <label>Email:</label><br>
        <input type="email" name="email" placeholder="Enter your email"><br><br>

        <!-- Password -->
        <label>Password:</label><br>
        <input type="password" name="password" placeholder="Enter password"><br><br>

        <!-- Number -->
        <label>Age:</label><br>
        <input type="number" name="age" placeholder="Enter your age"><br><br>

        <!-- Radio Buttons -->
        <label>Gender:</label><br>
        <input type="radio" name="gender" value="male"> Male
        <input type="radio" name="gender" value="female"> Female<br><br>

        <!-- Checkbox -->
        <label>Skills:</label><br>
        <input type="checkbox" name="skill" value="java"> Java
        <input type="checkbox" name="skill" value="python"> Python
        <input type="checkbox" name="skill" value="testing"> Testing<br><br>

        <!-- Date -->
        <label>Date of Birth:</label><br>
        <input type="date" name="dob"><br><br>

        <!-- File Upload -->
        <label>Upload Resume:</label><br>
        <input type="file" name="resume"><br><br>

        <!-- Submit & Reset -->
        <input type="submit" value="Register">
        <input type="reset" value="Clear">

    </form>

</body>
</html>
