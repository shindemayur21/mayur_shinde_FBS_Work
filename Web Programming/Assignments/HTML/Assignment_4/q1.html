<!DOCTYPE html>
<html>
<head>
    <title>List Example</title>
</head>
<body>

    <h1>Programming Courses</h1>

    <!-- Unordered List -->
    <h2>Available Courses (Unordered List)</h2>
    <ul type="circle">
        <li>C Programming</li>
        <li>Java Programming</li>
        <li>Python Programming</li>
    </ul>

    <!-- Ordered List -->
    <h2>Course Levels (Ordered List)</h2>
    <ol type="A" start="1">
        <li>Beginner</li>
        <li>Intermediate</li>
        <li>Advanced</li>
    </ol>

    <!-- Another Ordered List Example -->
    <h2>Steps to Learn Programming</h2>
    <ol type="1" start="3">
        <li>Practice Coding</li>
        <li>Build Projects</li>
        <li>Attend Interviews</li>
    </ol>

</body>
</html>
